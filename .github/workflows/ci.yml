name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  LLVM_RUN_CLANG_TIDY_SHA: c13b7485b87909fcf739f62cfa382b55407433c0

jobs:
  format:
    name: clang-format
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install dependencies
        run: |
          python3 -m pip install --upgrade pip
          python3 -m pip install jinja2
          sudo apt-get update
          sudo apt-get install -y clang-format

      - name: Run clang-format
        run: |
          clang-format --verbose --dry-run -Werror $(find . -path ./build -prune -o \( -name '*.cpp' -o -name '*.hpp' \) -print)

  lint:
    name: clang-tidy
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install dependencies
        run: |
          python3 -m pip install --upgrade pip
          python3 -m pip install jinja2
          sudo apt-get update
          sudo apt-get install -y clang clang-tidy cmake ninja-build curl libwayland-dev libwayland-bin libxkbcommon-dev wayland-protocols xorg-dev libdbus-1-dev

      - name: Download run-clang-tidy.py
        run: |
          curl -fL --retry 3 --retry-delay 2 \
            -o run-clang-tidy.py \
            "https://raw.githubusercontent.com/llvm/llvm-project/${LLVM_RUN_CLANG_TIDY_SHA}/clang-tools-extra/clang-tidy/tool/run-clang-tidy.py"

      - name: Configure
        run: |
          cmake --preset=linux-clang-release -DPython_EXECUTABLE="$(command -v python3)"
          cmake --build --preset=linux-clang-release --parallel

      - name: Run clang-tidy
        run: |
          python3 run-clang-tidy.py -p build/linux-clang-release -warnings-as-errors * -use-color -quiet -header-filter "(k|m)En[\\/ ]src[\\/ ].*"

  build-test:
    name: ${{ matrix.name }}
    if: matrix.enabled
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: linux-gcc
            os: ubuntu-24.04
            preset: linux-gcc-release
            packages: "gcc g++"
            enabled: false # generates too much errors at the moment, noncritical

          - name: linux-clang
            os: ubuntu-24.04
            preset: linux-clang-release
            packages: "clang"
            enabled: false # generates too much errors at the moment, noncritical

          - name: windows-msvc
            os: windows-2022
            preset: windows-msvc-release
            msvc: true
            enabled: true

          - name: windows-clang
            os: windows-2022
            preset: windows-clang-release
            enabled: true

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        shell: bash
        run: |
          python3 -m pip install --upgrade pip
          python3 -m pip install jinja2
          sudo apt-get update
          sudo apt-get install -y cmake ninja-build ${{ matrix.packages }} libwayland-dev libwayland-bin libxkbcommon-dev wayland-protocols xorg-dev libdbus-1-dev

      - name: Install Windows dependencies
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          python3 -m pip install --upgrade pip
          python3 -m pip install jinja2

      - name: Setup MSVC environment
        if: matrix.msvc
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: Configure (Linux)
        if: runner.os == 'Linux'
        shell: bash
        run: |
          cmake --preset=${{ matrix.preset }} -DPython_EXECUTABLE="$(command -v python3)"

      - name: Configure (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          cmake --preset=${{ matrix.preset }} -DPython_EXECUTABLE="$((Get-Command python3).Path)"

      - name: Build (Linux)
        if: runner.os == 'Linux'
        shell: bash
        run: |
          cmake --build --preset=${{ matrix.preset }} --parallel

      - name: Build (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          cmake --build --preset=${{ matrix.preset }} --parallel

      - name: Run tests (Linux)
        if: runner.os == 'Linux'
        shell: bash
        working-directory: ./build/${{ matrix.preset }}
        run: |
          ctest --output-on-failure -j "$(nproc)"

      - name: Run tests (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        working-directory: ./build/${{ matrix.preset }}
        run: |
          ctest --output-on-failure -j $env:NUMBER_OF_PROCESSORS
