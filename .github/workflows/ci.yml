name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  LLVM_RUN_CLANG_TIDY_SHA: c13b7485b87909fcf739f62cfa382b55407433c0

jobs:
  format:
    name: clang-format
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install dependencies
        run: |
          python3 -m pip install --upgrade pip
          python3 -m pip install jinja2
          sudo apt-get update
          sudo apt-get install -y clang-format

      - name: Run clang-format
        run: |
          clang-format --verbose --dry-run -Werror $(find . -path ./build -prune -o \( -name '*.cpp' -o -name '*.hpp' \) -print)

  lint:
    name: clang-tidy
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install dependencies
        run: |
          python3 -m pip install --upgrade pip
          python3 -m pip install jinja2
          sudo apt-get update
          sudo apt-get install -y clang clang-tidy cmake ninja-build curl

      - name: Download pinned run-clang-tidy.py
        run: |
          curl -fL --retry 3 --retry-delay 2 \
            -o run-clang-tidy.py \
            "https://raw.githubusercontent.com/llvm/llvm-project/${LLVM_RUN_CLANG_TIDY_SHA}/clang-tools-extra/clang-tidy/tool/run-clang-tidy.py"

      - name: Configure
        run: |
          cmake --preset=linux-clang-release -DPython_EXECUTABLE="$(command -v python3)" -DGLFW_BUILD_WAYLAND=OFF
          cmake --build --preset=linux-clang-release --parallel

      - name: Run clang-tidy
        run: |
          python3 run-clang-tidy.py -p build/linux-clang-release -warnings-as-errors * -use-color -quiet -header-filter "(k|m)En[\\/ ]src[\\/ ].*"
