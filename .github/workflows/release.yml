name: Build Source Code on Windows 🪟

on:
  push:
    branches: [main]
    tags:
      - "*"
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

env:
  BINARY_NAME: Sandbox

jobs:
  windows-build:
    runs-on: windows-2022

    permissions:
      contents: write

    steps:
      - name: Checkout code
        id: checkout-code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install dependencies
        id: install-deps
        shell: pwsh
        run: |
          python3 -m pip install --upgrade pip
          python3 -m pip install jinja2

      - name: Setup MSVC environment
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: MSVC Build x64
        id: msvc-build
        shell: pwsh
        run: |
          cmake --preset=windows-msvc-release -DPython_EXECUTABLE="$((get-command python3).Path)"
          cmake --build --preset=windows-msvc-release --parallel

      - name: Clang Build x64
        id: clang-build
        shell: pwsh
        run: |
          cmake --preset=windows-clang-release -DPython_EXECUTABLE="$((get-command python3).Path)"
          cmake --build --preset=windows-clang-release --parallel

      - name: Create artifact payload
        id: create-artifact
        shell: pwsh
        run: |
          $out = "./artifact/${{ env.BINARY_NAME }}-windows-x64"
          New-Item -ItemType Directory -Force -Path $out

          Copy-Item "./build/windows-msvc-release/bin/${{ env.BINARY_NAME }}.exe" $out
          Copy-Item "./build/windows-msvc-release/bin/assets" "$out/assets" -Recurse

          $imguiIni = "./build/windows-msvc-release/bin/imgui.ini"
          if (Test-Path $imguiIni) {
            Copy-Item $imguiIni $out
            Write-Host "Included: imgui.ini"
          } else {
            Write-Host "File not found, skipping: imgui.ini"
          }

      - name: Create release zip
        id: create-release-zip
        shell: pwsh
        run: |
          & 7z a "./artifact/${{ env.BINARY_NAME }}-windows-x64.zip" `
            "./artifact/${{ env.BINARY_NAME }}-windows-x64/*"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.BINARY_NAME }}-binary-archives
          path: ./artifact/${{ env.BINARY_NAME }}-windows-x64

      - name: Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: ./artifact/${{ env.BINARY_NAME }}-windows-x64.zip
          generate_release_notes: true

      - name: Run latest-tag
        uses: EndBug/latest-tag@latest
        if: github.event_name != 'pull_request'
        with:
          ref: unstable-latest

      - name: Pre-Release
        uses: softprops/action-gh-release@v2
        if: github.event_name != 'pull_request'
        with:
          files: ./artifact/${{ env.BINARY_NAME }}-windows-x64.zip
          prerelease: true
          name: Auto Unstable Build
          tag_name: unstable-latest
