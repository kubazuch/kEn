name: Release Windows

on:
  push:
    branches: [main]
    tags:
      - "*"

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

env:
  BINARY_NAME: Sandbox

jobs:
  package-windows:
    name: package-windows
    runs-on: windows-2022

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install dependencies
        shell: pwsh
        run: |
          python3 -m pip install --upgrade pip
          python3 -m pip install jinja2

      - name: Setup MSVC environment
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: Build
        shell: pwsh
        run: |
          cmake --preset=windows-msvc-release -DPython_EXECUTABLE="$((Get-Command python3).Path)"
          cmake --build --preset=windows-msvc-release --parallel

      - name: Create artifact payload
        shell: pwsh
        run: |
          $out = "./artifact/${{ env.BINARY_NAME }}-windows-x64"
          New-Item -ItemType Directory -Force -Path $out

          Copy-Item "./build/windows-msvc-release/bin/${{ env.BINARY_NAME }}.exe" $out
          Copy-Item "./build/windows-msvc-release/bin/assets" "$out/assets" -Recurse

          $imguiIni = "./build/windows-msvc-release/bin/imgui.ini"
          if (Test-Path $imguiIni) {
            Copy-Item $imguiIni $out
            Write-Host "Included: imgui.ini"
          } else {
            Write-Host "File not found, skipping: imgui.ini"
          }

      - name: Create release zip
        shell: pwsh
        run: |
          & 7z a "./artifact/${{ env.BINARY_NAME }}-windows-x64.zip" `
            "./artifact/${{ env.BINARY_NAME }}-windows-x64/*"

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-release-zip
          path: ./artifact/${{ env.BINARY_NAME }}-windows-x64.zip

    outputs:
      artifact_name: windows-release-zip

  tagged-release:
    name: tagged
    if: startsWith(github.ref, 'refs/tags/')
    needs: package-windows
    runs-on: windows-2022

    steps:
      - name: Download packaged artifact
        uses: actions/download-artifact@v4
        with:
          name: windows-release-zip
          path: ./artifact

      - name: Publish tagged release
        uses: softprops/action-gh-release@v2
        with:
          files: ./artifact/${{ env.BINARY_NAME }}-windows-x64.zip
          generate_release_notes: true

  unstable-release:
    name: unstable-latest
    if: github.ref == 'refs/heads/main'
    needs: package-windows
    runs-on: windows-2022

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download packaged artifact
        uses: actions/download-artifact@v4
        with:
          name: windows-release-zip
          path: ./artifact

      - name: Update unstable tag
        uses: EndBug/latest-tag@latest
        with:
          ref: unstable-latest

      - name: Publish unstable prerelease
        uses: softprops/action-gh-release@v2
        with:
          files: ./artifact/${{ env.BINARY_NAME }}-windows-x64.zip
          prerelease: true
          name: Auto Unstable Build
          tag_name: unstable-latest
