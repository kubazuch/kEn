name: Release

on:
  push:
    branches: [main]

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write
  pull-requests: read

env:
  BINARY_NAME: Sandbox

jobs:
  version:
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.determine.outputs.tag }}
    steps:
      - name: Determine PR + version tag
        id: determine
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          MAJOR_LABEL: "version/major 🏗️"
          MINOR_LABEL: "version/minor 🔨"
          PATCH_LABEL: "version/patch 🪶"
        run: |
          pr_json='[]'
          pr_number=''

          for i in 1 2 3 4 5; do
            pr_json="$(gh api "repos/${GITHUB_REPOSITORY}/commits/${GITHUB_SHA}/pulls" \
              -H "Accept: application/vnd.github+json" || echo '[]')"

            pr_number="$(jq -r '.[0].number // empty' <<<"$pr_json")"

            if [ -n "$pr_number" ]; then
              echo "Resolved PR #$pr_number on attempt $i"
              break
            fi

            echo "PR association not visible yet, retry $i..."
            sleep 3
          done

          # Fallback: search merged PRs by commit SHA
          if [ -z "$pr_number" ]; then
            pr_number="$(
              gh pr list \
                --search "$GITHUB_SHA" \
                --state merged \
                --base main \
                --limit 1 \
                --json number \
                --jq '.[0].number // empty'
            )"
          fi

          if [ -z "$pr_number" ]; then
            echo "No PR associated with this commit; unstable only."
            exit 0
          fi

          labels="$(
            gh pr view "$pr_number" --json labels --jq '.labels[].name'
          )"

          # Fetch the highest tag
          current_tag="$(
            gh api repos/$GITHUB_REPOSITORY/tags \
              --jq '[.[].name | select(startswith("v"))]
                    | sort_by(ltrimstr("v") | split(".") | map(tonumber))
                    | last // "v0.0.0"'
          )"
          echo "The current tag is: $current_tag"

          # Parse the current version into major, minor, patch parts
          IFS='.' read -r major minor patch <<< "${current_tag//v/}"

          # Calculate the next version
          if grep -Fxq "$MAJOR_LABEL" <<<"$labels"; then
            echo "Found major release label '$MAJOR_LABEL'."
            major=$((major + 1)); minor=0; patch=0
          elif grep -Fxq "$MINOR_LABEL" <<<"$labels"; then
            echo "Found minor release label '$MINOR_LABEL'."
            minor=$((minor + 1)); patch=0
          elif grep -Fxq "$PATCH_LABEL" <<<"$labels"; then
            echo "Found patch release label '$PATCH_LABEL'."
            patch=$((patch + 1))
          else
            echo "Nothing to do! Neither of labels '$MAJOR_LABEL', '$MINOR_LABEL' nor '$PATCH_LABEL' found."
            exit 0
          fi

          # Format the new tag
          new_tag="v$major.$minor.$patch"
          echo "The new tag is: $new_tag"
          echo "tag=$new_tag" >> "$GITHUB_OUTPUT"

      - name: Create tag
        if: steps.determine.outputs.tag != ''
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const tagName = '${{ steps.determine.outputs.tag }}';
            const tagSha  = context.sha;

            const { data: tagData } = await github.rest.git.createTag({
              owner:   context.repo.owner,
              repo:    context.repo.repo,
              tag:     tagName,
              message: `Annotated tag for release ${tagName}`,
              object:  tagSha,
              type:    'commit',
              tagger: {
                name:  'GitHub Actions',
                email: 'actions@github.com',
                date:  new Date().toISOString()
              }
            });

            try {
              await github.rest.git.createRef({
                owner: context.repo.owner,
                repo:  context.repo.repo,
                ref:   `refs/tags/${tagName}`,
                sha:   tagData.sha
              });
            } catch (err) {
              if (err.status !== 422) throw err;
              await github.rest.git.updateRef({
                owner: context.repo.owner,
                repo:  context.repo.repo,
                ref:   `tags/${tagName}`,
                sha:   tagData.sha
              });
            }

  package-windows:
    needs: version
    runs-on: windows-2022

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install dependencies
        shell: pwsh
        run: |
          python3 -m pip install --upgrade pip
          python3 -m pip install jinja2

      - name: Setup MSVC environment
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: Build
        shell: pwsh
        run: |
          cmake --preset=windows-msvc-release -DPython_EXECUTABLE="$((Get-Command python3).Path)"
          cmake --build --preset=windows-msvc-release --parallel

      - name: Create artifact payload
        shell: pwsh
        run: |
          $out = "./artifact/${{ env.BINARY_NAME }}-windows-x64"
          New-Item -ItemType Directory -Force -Path $out

          Copy-Item "./build/windows-msvc-release/bin/${{ env.BINARY_NAME }}.exe" $out
          Copy-Item "./build/windows-msvc-release/bin/assets" "$out/assets" -Recurse

          $imguiIni = "./build/windows-msvc-release/bin/imgui.ini"
          if (Test-Path $imguiIni) {
            Copy-Item $imguiIni $out
            Write-Host "Included: imgui.ini"
          } else {
            Write-Host "File not found, skipping: imgui.ini"
          }

      - name: Create release zip
        shell: pwsh
        run: |
          & 7z a "./artifact/${{ env.BINARY_NAME }}-windows-x64.zip" `
            "./artifact/${{ env.BINARY_NAME }}-windows-x64/*"

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-release-zip
          path: ./artifact/${{ env.BINARY_NAME }}-windows-x64.zip

    outputs:
      artifact_name: windows-release-zip

  unstable-release:
    needs: package-windows
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download packaged artifact
        uses: actions/download-artifact@v4
        with:
          name: windows-release-zip
          path: ./artifact

      - name: Update unstable tag
        uses: EndBug/latest-tag@latest
        with:
          ref: unstable-latest

      - name: Publish unstable prerelease
        uses: softprops/action-gh-release@v2
        with:
          files: ./artifact/${{ env.BINARY_NAME }}-windows-x64.zip
          prerelease: true
          name: Auto Unstable Build
          tag_name: unstable-latest

  tagged-release:
    needs: [version, package-windows]
    if: needs.version.outputs.tag != ''
    runs-on: ubuntu-latest

    steps:
      - name: Download packaged artifact
        uses: actions/download-artifact@v4
        with:
          name: windows-release-zip
          path: ./artifact

      - name: Publish tagged release
        uses: softprops/action-gh-release@v2
        with:
          files: ./artifact/${{ env.BINARY_NAME }}-windows-x64.zip
          generate_release_notes: true
